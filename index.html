<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
  <meta name="theme-color" content="#f97316">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <meta name="description" content="Monthly Disciplined — Jonathan's Challenge. Track your daily habits.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Monthly Disciplined">

  <title>Monthly Disciplined — Jonathan's Challenge</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <a href="#view-root" class="visually-hidden focus:not-sr-only" style="top: 1rem; left: 1rem; z-index: 999; background: var(--color-primary); color: white; padding: 0.5rem 1rem; border-radius: var(--radius-md);">Skip to content</a>
  <div id="app"></div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js" async></script>
  <script src="./app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const registerSW = () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('[App] SW registered, scope:', reg.scope))
            .catch(err => console.error('[App] SW registration failed:', err));
        };
        if ('requestIdleCallback' in window) {
          requestIdleCallback(registerSW);
        } else {
          setTimeout(registerSW, 1000);
        }
      });
    }
  </script>
</body>
</html>
